# Game Service Docker Configuration
# Overrides application.properties when running in Docker (SPRING_PROFILES_ACTIVE=docker)

spring.datasource.url=jdbc:postgresql://postgres:5432/obhl_db
spring.datasource.username=obhl_admin
spring.datasource.password=changeme

# Allow Hibernate to add new columns automatically (e.g. playoff_round, bracket_position)
# Safe: only adds columns, never drops or modifies existing ones
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
