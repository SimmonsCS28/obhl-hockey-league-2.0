spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/obhl_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:obhl_admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:changeme}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
management.endpoints.web.exposure.include=health,info,env
management.endpoint.health.show-details=always
