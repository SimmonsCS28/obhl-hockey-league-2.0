# Application Metadata
spring.application.name=OBHL Stats Service
api.version=1.0.0
api.v1.prefix=/api/v1

# Server Configuration
server.port=8003

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/obhl_db
spring.datasource.username=obhl_admin
spring.datasource.password=changeme
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Environment
app.environment=${ENVIRONMENT:dev}

# JWT (must match api-gateway's jwt.secret — used to validate tokens api-gateway issues)
jwt.secret=obhl-secret-key-change-in-production-minimum-256-bits-required

# Shared secret for trusted server-to-server calls (game-service, league-service,
# api-gateway's own internal callers) — see JwtAuthenticationFilter
internal.service.key=obhl-internal-service-key-change-in-production

# Player.Views.Public/Privileged rely on Jackson's default behavior of always
# including properties with no @JsonView annotation; make that explicit rather than
# relying on the framework default.
spring.jackson.mapper.default-view-inclusion=true

# CORS Configuration
app.cors.allowed-origins=*
app.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true

# Actuator
management.endpoints.web.exposure.include=health,info,env
management.endpoint.health.show-details=when-authorized
