<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <!-- Auto-retry: once the deploy finishes and the site is back, this reloads into it. -->
    <meta http-equiv="refresh" content="30" />
    <title>Old Buzzard Hockey League — Be Right Back</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:ital,wght@0,700;0,800;0,900;1,900&family=Saira:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #0b0c0f;
            --card: #13171d;
            --accent: #F6A91C;
            --text: #EAEEF2;
            --muted: #9DB9CD;
            --dim: #7E8A94;
            --border: rgba(157, 185, 205, 0.16);
            --font-display: 'Saira Condensed', system-ui, sans-serif;
            --font-body: 'Saira', system-ui, sans-serif;
        }
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .wrap {
            width: 100%;
            max-width: 540px;
            background: linear-gradient(160deg, #13171d, #10141a);
            border: 1px solid var(--border);
            border-top: 3px solid var(--accent);
            border-radius: 16px;
            padding: 48px 40px 40px;
            text-align: center;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
        }
        .eyebrow {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 10px;
        }
        .wordmark {
            font-family: var(--font-display);
            font-weight: 900;
            font-style: italic;
            font-size: clamp(30px, 7vw, 44px);
            line-height: 0.95;
            color: #fff;
            margin: 0 0 22px;
        }
        .puck {
            width: 54px;
            height: 54px;
            margin: 0 auto 22px;
            border-radius: 50%;
            background: rgba(246, 169, 28, 0.12);
            border: 1px solid rgba(246, 169, 28, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
        }
        h1 {
            font-family: var(--font-display);
            font-weight: 800;
            font-style: italic;
            font-size: 26px;
            color: #fff;
            margin: 0 0 12px;
        }
        p {
            font-size: 15.5px;
            line-height: 1.6;
            color: var(--muted);
            margin: 0 auto 8px;
            max-width: 420px;
        }
        .note {
            margin-top: 22px;
            font-size: 12.5px;
            color: var(--dim);
        }
        .spinner {
            width: 16px;
            height: 16px;
            margin-right: 8px;
            vertical-align: -2px;
            border: 2px solid rgba(157, 185, 205, 0.25);
            border-top-color: var(--accent);
            border-radius: 50%;
            display: inline-block;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <main class="wrap">
        <div class="eyebrow">Old Buzzard Hockey League</div>
        <div class="puck" aria-hidden="true">🏒</div>
        <h1>We'll Be Right Back</h1>
        <p>The site is down for a quick update — we're changing lines and will be back on the ice shortly.</p>
        <p class="note"><span class="spinner" aria-hidden="true"></span>This page checks back automatically every 30 seconds.</p>
    </main>
</body>
</html>
